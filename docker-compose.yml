version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://devopsuser:devopspass@db:5432/devopsdb
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: devopsdb
      POSTGRES_USER: devopsuser
      POSTGRES_PASSWORD: devopspass
    ports:
      - "5432:5432"

  firefox:
    image: selenium/standalone-firefox:latest
    ports:
      - "4444:4444"
    shm_size: 2gb
    extra_hosts:
      - "host.docker.internal:host-gateway"
