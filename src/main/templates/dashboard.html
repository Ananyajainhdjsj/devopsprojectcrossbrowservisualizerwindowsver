<!DOCTYPE html>
<html>
<head>
    <title>Cross Browser Test Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Cross Browser Test Results</h2>

<table border="1">
<tr>
    <th>Test</th>
    <th>Browser</th>
    <th>Status</th>
    <th>Time</th>
</tr>

{% for r in results %}
<tr>
    <td>{{ r.test_name }}</td>
    <td>{{ r.browser }}</td>
    <td>{{ r.status }}</td>
    <td>{{ r.execution_time }}</td>
</tr>
{% endfor %}

</table>


<h3>Pass / Fail Comparison</h3>
<canvas id="resultChart"></canvas>


<h3>Execution Time Comparison</h3>
<canvas id="timeChart"></canvas>


<script>

const ctx = document.getElementById("resultChart");

new Chart(ctx, {
    type: "bar",
    data: {
        labels: ["Chrome", "Firefox", "Edge"],
        datasets: [
            {
                label: "Pass",
                data: [{{ chrome_pass }}, {{ firefox_pass }}, {{ edge_pass }}],
                backgroundColor: "green"
            },
            {
                label: "Fail",
                data: [{{ chrome_fail }}, {{ firefox_fail }}, {{ edge_fail }}],
                backgroundColor: "red"
            }
        ]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});


const timeCtx = document.getElementById("timeChart");

new Chart(timeCtx, {
    type: "bar",
    data: {
        labels: ["Chrome", "Firefox", "Edge"],
        datasets: [{
            label: "Execution Time (seconds)",
            data: [{{ chrome_time }}, {{ firefox_time }}, {{ edge_time }}],
            backgroundColor: ["blue", "orange", "purple"]
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

</script>

</body>
</html>
